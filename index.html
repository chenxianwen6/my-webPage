<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测一测你是什么动物 - 趣味性格测试</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Microsoft YaHei",sans-serif;
}
body{
    background:#f5f7fa;
    color:#333;
    padding:20px;
}
.container{
    max-width:600px;
    margin:0 auto;
}
.header{
    text-align:center;
    margin:40px 0 30px;
}
.header h1{
    font-size:26px;
    color:#222;
    margin-bottom:10px;
}
.header p{
    color:#666;
    font-size:15px;
}
.card{
    background:#fff;
    border-radius:16px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
    padding:30px;
    margin-bottom:20px;
}
.question{
    font-size:18px;
    font-weight:500;
    margin-bottom:20px;
    color:#222;
}
.option{
    display:block;
    width:100%;
    padding:14px 18px;
    border:1px solid #e1e4e8;
    border-radius:12px;
    margin-bottom:12px;
    background:#fafbfc;
    cursor:pointer;
    transition:all 0.2s;
    font-size:15px;
}
.option:hover{
    border-color:#4b98f1;
    background:#eef5ff;
}
.option.active{
    border-color:#4b98f1;
    background:#eef5ff;
}
.btn-next{
    display:block;
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#4b98f1;
    color:#fff;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    margin-top:10px;
}
.btn-next:disabled{
    background:#ccc;
    cursor:not-allowed;
}
.progress{
    text-align:center;
    color:#666;
    font-size:14px;
    margin-bottom:15px;
}
.result{
    display:none;
    text-align:center;
}
.result h2{
    font-size:22px;
    margin-bottom:10px;
    color:#222;
}
.result .animal{
    font-size:28px;
    font-weight:bold;
    color:#4b98f1;
    margin:10px 0;
}
.result .desc{
    text-align:left;
    font-size:15px;
    line-height:1.7;
    color:#444;
    margin-top:20px;
}
.restart{
    margin-top:25px;
    padding:12px 24px;
    background:#fff;
    border:1px solid #4b98f1;
    color:#4b98f1;
    border-radius:12px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🐾 测一测你是什么动物</h1>
        <p>通过10道题，发现你内心深处的动物人格</p>
    </div>

    <div class="progress" id="progress">第 1 题 / 共 10 题</div>

    <div class="card" id="testCard">
        <div class="question" id="question"></div>
        <div id="options"></div>
        <button class="btn-next" id="next" disabled>下一步</button>
    </div>

    <div class="card result" id="resultCard">
        <h2>你的动物人格是</h2>
        <div class="animal" id="resultAnimal"></div>
        <div class="desc" id="resultDesc"></div>
        <button class="restart" onclick="location.reload()">再测一次</button>
    </div>
</div>

<script>
// 10 道题目
const questions = [
    {
        q:"遇到困难时，你更倾向于？",
        o:["立刻想办法解决","先冷静观察再行动","找人一起商量","尽量避开麻烦"]
    },
    {
        q:"在朋友圈里，你通常是？",
        o:["带动气氛的人","安静倾听的人","照顾大家的人","偶尔出现的人"]
    },
    {
        q:"你更喜欢的生活节奏是？",
        o:["充实忙碌","稳定规律","自由随性","安静悠闲"]
    },
    {
        q:"做决定时，你更？",
        o:["果断直接","谨慎思考","跟着感觉走","犹豫不决"]
    },
    {
        q:"面对陌生人，你会？",
        o:["主动打招呼","礼貌保持距离","有点害羞","不太想交流"]
    },
    {
        q:"你更看重？",
        o:["成就与目标","安稳与舒适","自由与快乐","和谐与关系"]
    },
    {
        q:"压力大时你会？",
        o:["运动发泄","独处放松","找人倾诉","睡觉放空"]
    },
    {
        q:"你更擅长？",
        o:["领导组织","细心执行","创意想法","沟通协调"]
    },
    {
        q:"你对未来的态度是？",
        o:["积极规划","顺其自然","有点担心","享受当下"]
    },
    {
        q:"别人对你的印象更接近？",
        o:["强势可靠","温柔体贴","聪明机灵","低调神秘"]
    }
];

// 动物结果
const animals = [
    {name:"老虎",desc:"你自信、果断、有领导力，目标感强，不畏惧挑战，天生自带气场，在团队中容易成为核心人物。"},
    {name:"猫咪",desc:"你独立又温柔，喜欢舒适自在，有自己的小世界，安静又有魅力，对喜欢的人很黏，对不喜欢的保持距离。"},
    {name:"狐狸",desc:"你聪明机灵、观察力强，反应快，善于用智慧解决问题，不喜欢硬碰硬，做事灵活，很有想法。"},
    {name:"熊猫",desc:"你温和稳重、踏实可靠，不爱争抢，给人很强的安全感，性格佛系，是大家都喜欢的治愈系伙伴。"},
    {name:"老鹰",desc:"你眼光长远、冷静理智，做事有规划，不轻易被情绪影响，判断力强，喜欢掌控自己的人生。"},
    {name:"海豚",desc:"你善良温暖、善于共情，很会照顾别人情绪，人缘好，喜欢和谐，是天生的治愈者。"}
];

let current = 0;
let scores = [];

const qEl = document.getElementById('question');
const optEl = document.getElementById('options');
const nextBtn = document.getElementById('next');
const progress = document.getElementById('progress');
const testCard = document.getElementById('testCard');
const resultCard = document.getElementById('resultCard');
const resultAnimal = document.getElementById('resultAnimal');
const resultDesc = document.getElementById('resultDesc');

function loadQuestion(){
    const q = questions[current];
    qEl.textContent = `${current+1}. ${q.q}`;
    optEl.innerHTML = '';
    nextBtn.disabled = true;
    progress.textContent = `第 ${current+1} 题 / 共 10 题`;

    q.o.forEach((item,i)=>{
        let div = document.createElement('div');
        div.className = 'option';
        div.textContent = item;
        div.onclick = ()=>{
            document.querySelectorAll('.option').forEach(o=>o.classList.remove('active'));
            div.classList.add('active');
            nextBtn.disabled = false;
            scores[current] = i;
        }
        optEl.appendChild(div);
    });
}

nextBtn.onclick = ()=>{
    current++;
    if(current < questions.length){
        loadQuestion();
    }else{
        showResult();
    }
};

function showResult(){
    testCard.style.display = 'none';
    resultCard.style.display = 'block';
    let sum = scores.reduce((a,b)=>a+b,0);
    let res = animals[sum % animals.length];
    resultAnimal.textContent = res.name;
    resultDesc.textContent = res.desc;
}

loadQuestion();
</script>
</body>
</html>
